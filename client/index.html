<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="خدمة توصيل سريعة وموثوقة مع تتبع فوري وسائقين محترفين" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="وصلي" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <title>منصة وصلي للتوصيل الذكية</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "c7e88fa4-df0e-42a5-960a-fd9088b949b4",
          safari_web_id: "web.onesignal.auto.09707374-9793-470a-976a-739088b949b4",
          notifyButton: {
            enable: true,
          },
          allowLocalhostAsSecureOrigin: true,
        });
      });

      // كود طلب تثبيت التطبيق (PWA Install Prompt)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => {
          if (deferredPrompt) {
            const installConfirm = confirm("لضمان وصول الإشعارات بشكل صحيح على شاشة القفل، يرجى إضافة 'واصلي' إلى الشاشة الرئيسية. هل تريد التثبيت الآن؟");
            if (installConfirm) {
              deferredPrompt.prompt();
              deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
              });
            }
          }
        }, 3000);
      });

      // إجبار طلب كافة الأذونات (إشعارات، موقع، كاميرا) فور فتح التطبيق
      window.addEventListener('load', () => {
        setTimeout(async () => {
          // 1. طلب إذن الإشعارات عبر OneSignal
          if (window.OneSignalDeferred) {
            window.OneSignalDeferred.push(async function(OneSignal) {
              const permission = await OneSignal.Notifications.permission;
              if (!permission) {
                console.log("[OneSignal] Requesting notification permission...");
                await OneSignal.Notifications.requestPermission();
              }
            });
          }

          // 2. طلب إذن الموقع الجغرافي (للخرائط وتتبع السائق)
          if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => console.log("[PWA] Location access granted"),
              (error) => console.error("[PWA] Location access denied", error),
              { enableHighAccuracy: true }
            );
          }

          // 3. طلب إذن الكاميرا (لتصوير الطلبات)
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            stream.getTracks().forEach(track => track.stop()); // إغلاق الكاميرا فور الحصول على الإذن
            console.log("[PWA] Camera access granted");
          } catch (err) {
            console.error("[PWA] Camera access denied", err);
          }
        }, 5000); // الانتظار 5 ثوانٍ لضمان استقرار التطبيق قبل طلب الأذونات
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
