<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="خدمة توصيل سريعة وموثوقة مع تتبع فوري وسائقين محترفين" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="وصلي" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <title>منصة وصلي للتوصيل الذكية</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "c7e88fa4-df0e-42a5-960a-fd9088b949b4",
          safari_web_id: "web.onesignal.auto.09707374-9793-470a-976a-739088b949b4",
          notifyButton: {
            enable: true,
          },
          allowLocalhostAsSecureOrigin: true,
        });
      });

      // كود طلب تثبيت التطبيق (PWA Install Prompt)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        // منع المتصفح من إظهار الرسالة التلقائية فوراً
        e.preventDefault();
        // حفظ الحدث ليتم تفعيله لاحقاً
        deferredPrompt = e;
        
        // إظهار رسالة مخصصة للمستخدم بعد 3 ثوانٍ من دخول الموقع
        setTimeout(() => {
          if (deferredPrompt) {
            const installConfirm = confirm("لضمان وصول الإشعارات بشكل صحيح على شاشة القفل، يرجى إضافة 'واصلي' إلى الشاشة الرئيسية. هل تريد التثبيت الآن؟");
            if (installConfirm) {
              deferredPrompt.prompt();
              deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                  console.log('User accepted the install prompt');
                }
                deferredPrompt = null;
              });
            }
          }
        }, 3000);
      });
    </script>
