<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="خدمة توصيل سريعة وموثوقة مع تتبع فوري وسائقين محترفين" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="وصلي" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <title>منصة وصلي للتوصيل الذكية</title>
    <script>
      // كود طلب تثبيت التطبيق (PWA Install Prompt)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // إنشاء نافذة مخصصة بدلاً من confirm الافتراضي لضمان تجربة أفضل
        const showInstallDialog = () => {
          if (!deferredPrompt) return;
          
          const dialog = document.createElement('div');
          dialog.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
            text-align: center;
            font-family: sans-serif;
            direction: rtl;
          `;
          
          dialog.innerHTML = `
            <h3 style="margin-top:0; color:#f97316;">تثبيت تطبيق واصلي</h3>
            <p style="color:#666; line-height:1.5;">لضمان وصول الإشعارات بشكل صحيح على شاشة القفل، يرجى إضافة 'واصلي' إلى الشاشة الرئيسية.</p>
            <div style="display:flex; gap:12px; margin-top:24px;">
              <button id="install-btn" style="flex:1; background:#f97316; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">حسناً</button>
              <button id="cancel-btn" style="flex:1; background:#eee; color:#333; border:none; padding:12px; border-radius:8px; cursor:pointer;">إلغاء</button>
            </div>
          `;
          
          const overlay = document.createElement('div');
          overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
          `;
          
          document.body.appendChild(overlay);
          document.body.appendChild(dialog);
          
          document.getElementById('install-btn').onclick = async () => {
            document.body.removeChild(dialog);
            document.body.removeChild(overlay);
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              console.log(`User response to install prompt: ${outcome}`);
              deferredPrompt = null;
            }
          };
          
          document.getElementById('cancel-btn').onclick = () => {
            document.body.removeChild(dialog);
            document.body.removeChild(overlay);
          };
        };

        // إظهار النافذة بعد 3 ثوانٍ من تحميل الصفحة
        setTimeout(showInstallDialog, 3000);
      });

      // تم إزالة طلب الأذونات التلقائي لضمان تجربة مستخدم أفضل
      console.log("[PWA] Automatic permission requests disabled");
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"

  </body>
